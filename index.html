<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siva Prasad Mukherjee | Profile</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for refined icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* BRAND COLOR PALETTE */
        :root {
            --champagne-gold: #C89B3C;
            --metallic-bronze: #8B5E1A;
            --soft-ivory: #F8F4EC;
            --cream-white: #FFFDF8;
            --premium-brown: #35271A;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: #E8E2D6;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--premium-brown);
        }

        /* Mobile Container Simulation */
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            background-color: var(--soft-ivory);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(53, 39, 26, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(139, 94, 26, 0.1);
        }

        /* Photo Header - Using your uploaded image */
        .photo-header {
            width: 100%;
            height: 52%;
            background-image: url('sivacanvas.png');
            background-size: cover;
            background-position: center top;
            position: relative;
        }

        /* Slanted Glass Box - Recreating the style from your screenshot */
        .slanted-info-box {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 88%;
            /* Luxury Champagne Gradient with Glassmorphism */
            background: linear-gradient(135deg, rgba(200, 155, 60, 0.92), rgba(139, 94, 26, 0.95));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 35px 25px;
            clip-path: polygon(0 0, 88% 0, 100% 100%, 0% 100%);
            color: var(--cream-white);
            z-index: 10;
        }

        .slanted-info-box h1 {
            font-family: 'Playfair Display', serif;
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .slanted-info-box .title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 8px 0;
            opacity: 0.9;
            font-weight: 300;
        }

        .slanted-info-box .company {
            font-size: 15px;
            font-weight: 600;
            display: block;
            margin-top: 5px;
        }

        /* Circular Action Buttons */
        .action-container {
            display: flex;
            justify-content: space-around;
            padding: 35px 25px 25px 25px;
            background: var(--soft-ivory);
        }

        .btn-circle {
            width: 54px;
            height: 54px;
            background-color: var(--premium-brown);
            color: var(--champagne-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 20px;
            box-shadow: 0 10px 20px rgba(53, 39, 26, 0.1);
            transition: all 0.3s ease;
            border: 1px solid rgba(200, 155, 60, 0.2);
        }

        .btn-circle:hover {
            transform: translateY(-3px);
            background-color: var(--metallic-bronze);
            color: white;
        }

        /* Social/Link Section */
        .links-wrapper {
            padding: 0 25px;
            flex-grow: 1;
            background: var(--soft-ivory);
        }

        .link-card {
            background-color: var(--cream-white);
            border-radius: 15px;
            padding: 18px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--premium-brown);
            border: 1px solid rgba(139, 94, 26, 0.05);
            transition: transform 0.2s ease;
        }

        .link-card:hover {
            transform: scale(1.02);
            border-color: var(--champagne-gold);
        }

        .link-icon {
            font-size: 26px;
            width: 45px;
            color: var(--metallic-bronze);
        }

        .link-body {
            flex-grow: 1;
        }

        .link-body .main-text {
            font-weight: 600;
            font-size: 16px;
            display: block;
        }

        .link-body .sub-text {
            font-size: 11px;
            color: #8B7E6F;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .chevron {
            color: var(--champagne-gold);
            font-size: 14px;
            opacity: 0.6;
        }

        /* Finishing Touches */
        .footer-logo {
            text-align: center;
            padding: 20px;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--metallic-bronze);
            opacity: 0.5;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <!-- Photo Header with Cinematic Warmth -->
        <div class="photo-header">
            <!-- Recreated the slanted box from your screenshot using your brand colors -->
            <div class="slanted-info-box">
                <h1>Siva Prasad Mukherjee</h1>

                <span class="company">Digital Creator.</span>
            </div>
        </div>

        <!-- Direct Contact Actions -->
        <div class="action-container">
            <a href="mailto:contact@creativewealth.com" class="btn-circle"><i class="fa-regular fa-envelope"></i></a>

            <a href="#" class="btn-circle"><i class="fa-regular fa-comment-dots"></i></a>
            <a href="#" class="btn-circle"><i class="fa-brands fa-whatsapp"></i></a>
        </div>

        <!-- Minimalist Promotion Links -->
        <div class="links-wrapper">
            <a href="#" class="link-card">
                <i class="fa-brands fa-facebook-f link-icon"></i>
                <div class="link-body">
                    <span class="main-text">Facebook</span>
                    <span class="sub-text">Exclusive Insights</span>
                </div>
                <i class="fa-solid fa-chevron-right chevron"></i>
            </a>

            <a href="#" class="link-card">
                <i class="fa-brands fa-instagram link-icon"></i>
                <div class="link-body">
                    <span class="main-text">Instagram</span>
                    <span class="sub-text">Lifestyle & Perspective</span>
                </div>
                <i class="fa-solid fa-chevron-right chevron"></i>
            </a>

            <a href="#" class="link-card">
                <i class="fa-brands fa-linkedin-in link-icon"></i>
                <div class="link-body">
                    <span class="main-text">LinkedIn</span>
                    <span class="sub-text">Professional Network</span>
                </div>
                <i class="fa-solid fa-chevron-right chevron"></i>
            </a>
        </div>

        <div class="footer-logo">
            &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee.
        </div>
    </div>

</body>
</html>
