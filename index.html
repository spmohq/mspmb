<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #8B5E1A;
            --light-bg: #35271A;
            --text-dark: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #FFFDF8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Container Simulation */
        .phone-container {
            width: 100%;
            max-width: 375px;
            height: 812px;
            background-color: var(--light-bg);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Top Profile Image */
        .profile-header {
            width: 100%;
            height: 45%;
            background-image: url('spmukherjeecoin.png'); /* REPLACE WITH YOUR IMAGE */
            background-size: cover;
            background-position: center top;
            position: relative;
        }

        /* Slanted Blue Info Box */
        .info-box {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 85%;
            background-color: var(--primary-blue);
            color: white;
            padding: 20px 25px;
            /* Creates the slanted edge on the right */
            clip-path: polygon(0 0, 90% 0, 100% 100%, 0% 100%);
            z-index: 2;
        }

        .info-box h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }

        .info-box p {
            margin: 5px 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .info-box .company {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }

        /* Circular Action Buttons */
        .action-buttons {
            display: flex;
            justify-content: space-around;
            padding: 25px 20px;
            gap: 10px;
        }

        .btn-circle {
            width: 50px;
            height: 50px;
            background-color: var(--primary-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .btn-circle:hover {
            transform: scale(1.1);
        }

        /* Link Cards Section */
        .links-container {
            padding: 0 20px;
            flex-grow: 1;
        }

        .link-card {
            background-color: var(--white);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-dark);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: background-color 0.2s;
        }

        .link-card:hover {
            background-color: #f8f9fa;
        }

        .link-icon {
            font-size: 30px;
            margin-right: 15px;
        }

        .facebook-color { color: #1877F2; }
        .instagram-color { color: #E4405F; }
        .linkedin-color { color: #0A66C2; }

        .link-text {
            flex-grow: 1;
        }

        .link-text .title {
            font-weight: bold;
            font-size: 16px;
            display: block;
        }

        .link-text .subtitle {
            font-size: 12px;
            color: #777;
        }

        .chevron {
            color: var(--primary-blue);
            font-size: 14px;
        }
        /* Finishing Touches */
        .footer-logo {
            text-align: center;
            padding: 20px;
            font-size: 10px;

            color: white;
            opacity: 0.5;

        }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- Header Section -->
        <div class="profile-header">
            <div class="info-box">
                <h1>Siva Prasad Mukherjee</h1>
                <p>Digital Creator</p>

            </div>
        </div>

        <!-- Circular Contact Buttons -->
        <div class="action-buttons">
            <a href="mailto:example@email.com" class="btn-circle"><i class="fas fa-envelope"></i></a>

            <a href="sms:+123456789" class="btn-circle"><i class="fas fa-comment-dots"></i></a>
            <a href="https://wa.me/123456789" class="btn-circle"><i class="fab fa-whatsapp"></i></a>
        </div>

        <!-- Social Media Links -->
        <div class="links-container">

            <a href="#" class="link-card">
                <i class="fa-solid fa-globe link-icon linkedin-color"></i>
                <div class="link-text">
                    <span class="title">Siva's Online Content Junction</span>
                    <span class="subtitle">Download my guides and tools</span>
                </div>
                <i class="fas fa-chevron-right chevron"></i>
            </a>

            <a href="#" class="link-card">
                <i class="fab fa-facebook link-icon facebook-color"></i>
                <div class="link-text">
                    <span class="title">Facebook</span>
                    <span class="subtitle">Follow me on Facebook</span>
                </div>
                <i class="fas fa-chevron-right chevron"></i>
            </a>

            <a href="#" class="link-card">
                <i class="fab fa-instagram link-icon instagram-color"></i>
                <div class="link-text">
                    <span class="title">Instagram</span>
                    <span class="subtitle">Follow me on Instagram</span>
                </div>
                <i class="fas fa-chevron-right chevron"></i>
            </a>


        </div>
        <div class="footer-logo">
            <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
        </div>
    </div>

</body>
</html>
